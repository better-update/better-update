name: Release

on:
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Dry run only (no tag push)"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PAT }}

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Generate Cloudflare types
        run: bun run typegen:cf

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Build
        run: bun run build

      - name: Lerna version (dry-run)
        if: ${{ inputs.dry-run }}
        run: bun run release:preview
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}

      - name: Lerna version
        if: ${{ !inputs.dry-run }}
        run: bun run release:version
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}

      - name: Push commit and tags individually
        if: ${{ !inputs.dry-run }}
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}
        run: |
          git push origin HEAD

          # Only the published (public) packages get a GitHub Release. Every
          # package is still versioned + tagged (history/changelog intact), but
          # private packages (server/web/api/...) don't warrant a release entry.
          PUBLIC_PACKAGES="@better-update/cli @better-update/bsdiff"

          for tag in $(git tag --points-at HEAD); do
            echo "Pushing $tag"
            git push origin "refs/tags/$tag"
            sleep 2

            name="${tag%@*}"
            version="${tag##*@}"

            case " $PUBLIC_PACKAGES " in
              *" $name "*) ;;
              *)
                echo "Skipping GitHub release for non-public package $name"
                continue
                ;;
            esac

            pkg_dir=""
            for pj in apps/*/package.json packages/*/package.json; do
              if [ "$(jq -r .name "$pj")" = "$name" ]; then
                pkg_dir="$(dirname "$pj")"
                break
              fi
            done

            notes_file="$(mktemp)"
            if [ -n "$pkg_dir" ] && [ -f "$pkg_dir/CHANGELOG.md" ]; then
              awk -v ver="$version" '
                /^## (\[|[0-9])/ {
                  if (found) exit
                  if (index($0, "[" ver "]") || $0 ~ ("^## " ver "( |$)")) {
                    found = 1
                    print
                    next
                  }
                  next
                }
                found { print }
              ' "$pkg_dir/CHANGELOG.md" > "$notes_file"
            fi

            if [ -s "$notes_file" ]; then
              echo "Creating release $tag with notes from $pkg_dir/CHANGELOG.md"
              gh release create "$tag" --verify-tag --title "$tag" --notes-file "$notes_file"
            else
              echo "Creating release $tag with auto-generated notes (no CHANGELOG section found)"
              gh release create "$tag" --verify-tag --title "$tag" --generate-notes
            fi
            rm -f "$notes_file"
          done
