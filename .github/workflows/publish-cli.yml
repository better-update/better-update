name: Publish CLI

on:
  push:
    tags:
      - "@better-update/cli@*"

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Generate Cloudflare types
        run: bun run typegen:cf

      - name: Build
        run: bun run build

      # `lerna publish from-package` ships the main @better-update/bsdiff here.
      # Its per-platform binary stubs are published separately by the "Build
      # bsdiff" workflow — fail loudly if they're not on npm yet, so the main
      # package never lands before its binaries (would 404 patch generation).
      - name: Check bsdiff release invariants (stubs published)
        run: bun run check:bsdiff -- --check-npm

      - name: Publish cli
        run: bun run release:publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
