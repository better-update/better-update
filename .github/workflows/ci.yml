name: CI

on:
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Generate Cloudflare types
        run: bun run typegen:cf

      - name: Lint + format check
        run: bun run check

      - name: Test
        run: bun run test

      - name: Build
        run: bun run build

  e2e-server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Generate Cloudflare types
        run: bun run typegen:cf

      - name: Server e2e (local pool)
        # Remote-R2 e2e (test:e2e-r2) needs Cloudflare creds this job has none of;
        # run the local pool suite here. Full `test:e2e` (pool + R2) runs locally.
        run: bun --filter @better-update/server test:e2e-pool

  integrations:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Generate Cloudflare types
        run: bun run typegen:cf

      - name: Integration tests
        run: bun run test:integrations
