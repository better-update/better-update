# Cross-platform prebuilt binaries for @better-update/bsdiff (napi-rs).
#
# STATUS: scaffolded, NOT yet wired into the release flow. The host (darwin-arm64)
# binary is built + proven locally; the other 7 targets in package.json's `napi.targets`
# can only be produced in CI (cross-compile / native runners). When ready to ship the
# CLI swap, flip `@better-update/bsdiff` to `private: false`, publish the per-platform
# optionalDependency packages from the artifacts this workflow uploads (`napi prepublish`),
# then publish the main package.
#
# This matrix follows the standard @napi-rs/cli layout: build each target, run
# `napi artifacts` to move the .node into npm/<platform>/, upload, then a publish
# job assembles + npm-publishes the split packages.

name: Build bsdiff

on:
  workflow_dispatch:
  push:
    paths:
      - "packages/bsdiff/**"
      - ".github/workflows/build-bsdiff.yml"

defaults:
  run:
    working-directory: packages/bsdiff

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: macos-latest
            target: aarch64-apple-darwin
            build: bun run build --target aarch64-apple-darwin
          - host: macos-latest
            target: x86_64-apple-darwin
            build: bun run build --target x86_64-apple-darwin
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            # zig cross-link keeps a portable glibc baseline.
            build: bun run build --target x86_64-unknown-linux-gnu --use-napi-cross
          - host: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            build: bun run build --target aarch64-unknown-linux-gnu --use-napi-cross
          - host: ubuntu-latest
            target: x86_64-unknown-linux-musl
            build: bun run build --target x86_64-unknown-linux-musl -x
          - host: ubuntu-latest
            target: aarch64-unknown-linux-musl
            build: bun run build --target aarch64-unknown-linux-musl -x
          - host: windows-latest
            target: x86_64-pc-windows-msvc
            build: bun run build --target x86_64-pc-windows-msvc
          - host: windows-latest
            target: aarch64-pc-windows-msvc
            build: bun run build --target aarch64-pc-windows-msvc
    name: build - ${{ matrix.settings.target }}
    runs-on: ${{ matrix.settings.host }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.settings.target }}

      # musl targets cross-compile via `napi build -x` (cargo-zigbuild), which
      # needs zig + cargo-zigbuild on PATH. --use-napi-cross only covers gnu.
      - name: Install zig
        if: contains(matrix.settings.target, 'musl')
        uses: mlugg/setup-zig@v2
        with:
          version: 0.14.1

      - name: Install cargo-zigbuild
        if: contains(matrix.settings.target, 'musl')
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-zigbuild

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            packages/bsdiff/target
          key: ${{ matrix.settings.target }}-cargo-${{ hashFiles('packages/bsdiff/Cargo.toml') }}

      - name: Install deps
        run: bun install --frozen-lockfile
        working-directory: .

      - name: Build
        run: ${{ matrix.settings.build }}

      # `napi build --platform` writes `bsdiff.<platform>.node` into the crate
      # folder. Upload the raw binary; the publish job runs `napi artifacts` to
      # collate downloaded binaries into npm/<platform>/ dirs.
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.settings.target }}
          path: packages/bsdiff/*.node
          if-no-files-found: error

  # Publish split optionalDependency packages + the main package.
  # Gated on a manual dispatch / tag once the CLI swap lands. Left here as the
  # documented shape; do not enable until @better-update/bsdiff is public.
  publish:
    if: ${{ github.event_name == 'workflow_dispatch' }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install deps
        run: bun install --frozen-lockfile
        working-directory: .

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: packages/bsdiff/artifacts

      - name: Move artifacts into npm dirs
        run: bun run artifacts

      - name: Publish (per-platform + main)
        run: |
          bunx napi prepublish -t npm
          # `napi prepublish` publishes the npm/<platform> packages; then the
          # main package (which has the optionalDependencies + loader) ships via Lerna.
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
