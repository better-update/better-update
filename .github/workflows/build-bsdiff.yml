# Cross-platform prebuilt binaries for @better-update/bsdiff (napi-rs).
#
# @better-update/bsdiff publishes as a main package + 8 per-platform
# optionalDependency stubs. This REUSABLE workflow cross-compiles all 8 `.node`
# targets and uploads them as artifacts. Publish CLI calls it (workflow_call) and
# then publishes the stubs + main package; `workflow_dispatch` is kept for manual
# rebuilds. The publishing itself lives in publish-cli.yml, not here.

name: Build bsdiff

on:
  workflow_call:
  workflow_dispatch:

defaults:
  run:
    working-directory: packages/bsdiff

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: macos-latest
            target: aarch64-apple-darwin
            build: bun run build --target aarch64-apple-darwin
          - host: macos-latest
            target: x86_64-apple-darwin
            build: bun run build --target x86_64-apple-darwin
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            # zig cross-link keeps a portable glibc baseline.
            build: bun run build --target x86_64-unknown-linux-gnu --use-napi-cross
          - host: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            build: bun run build --target aarch64-unknown-linux-gnu --use-napi-cross
          - host: ubuntu-latest
            target: x86_64-unknown-linux-musl
            build: bun run build --target x86_64-unknown-linux-musl -x
          - host: ubuntu-latest
            target: aarch64-unknown-linux-musl
            build: bun run build --target aarch64-unknown-linux-musl -x
          - host: windows-latest
            target: x86_64-pc-windows-msvc
            build: bun run build --target x86_64-pc-windows-msvc
          - host: windows-latest
            target: aarch64-pc-windows-msvc
            build: bun run build --target aarch64-pc-windows-msvc
    name: build - ${{ matrix.settings.target }}
    runs-on: ${{ matrix.settings.host }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.settings.target }}

      # musl targets cross-compile via `napi build -x` (cargo-zigbuild), which
      # needs zig + cargo-zigbuild on PATH. --use-napi-cross only covers gnu.
      - name: Install zig
        if: contains(matrix.settings.target, 'musl')
        uses: mlugg/setup-zig@v2
        with:
          version: 0.14.1

      - name: Install cargo-zigbuild
        if: contains(matrix.settings.target, 'musl')
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-zigbuild

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            packages/bsdiff/target
          key: ${{ matrix.settings.target }}-cargo-${{ hashFiles('packages/bsdiff/Cargo.toml') }}

      - name: Install deps
        run: bun install --frozen-lockfile
        working-directory: .

      - name: Build
        run: ${{ matrix.settings.build }}

      # `napi build --platform` writes `bsdiff.<platform>.node` into the crate
      # folder. Upload it; the Publish CLI publish job runs `napi artifacts` to
      # collate the downloaded binaries into npm/<platform>/ before publishing.
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.settings.target }}
          path: packages/bsdiff/*.node
          if-no-files-found: error
